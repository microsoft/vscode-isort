# PR and Push validation pipeline

trigger:
  branches:
    include:
      - main
      - release
      - release/*
      - release-*

pr:
  branches:
    include:
      - main
      - release
      - release/*
      - release-*
  drafts: false

resources:
  repositories:
    - repository: MicroBuildTemplate
      type: git
      name: 1ESPipelineTemplates/MicroBuildTemplate
      ref: refs/tags/release

    - repository: templates
      type: git
      name: DevDiv/Pylance-Eng
      ref: refs/heads/main
variables:
  - name: TeamName
    value: VSCode-isort
  - name: VsixName
    value: isort.vsix
  - name: AZURE_ARTIFACTS_FEED
    value: 'https://pkgs.dev.azure.com/azure-public/vside/_packaging/python-environments/npm/registry/'

parameters:
  - name: buildSteps
    type: stepList
    default:
      - script: npm ci
        displayName: Install NPM dependencies

      - script: python -m pip install -U pip
        displayName: Upgrade pip

      - script: python -m pip install wheel
        displayName: Install wheel

      - script: python -m pip install nox
        displayName: Install nox

      - script: python -m nox --session install_bundled_libs
        displayName: Install Python dependencies

      - script: npm run package
        displayName: Build extension

extends:
  template: azure-pipelines/MicroBuild.1ES.Unofficial.yml@MicroBuildTemplate
  parameters:
    sdl:
      enabled: false
      sourceAnalysisPool: VSEngSS-MicroBuild2022-1ES
    pool:
      name: AzurePipelines-EO
      os: windows

    customBuildTags:
      - ES365AIMigrationTooling
    stages:
      - stage: PreBuildDebug
        displayName: Pre-Build npm Debug
        jobs:
          - job: NpmDebug
            displayName: npm Debug Checks
            pool:
              name: AzurePipelines-EO
              image: 1ESPT-Windows2022
              os: windows
            steps:
              - checkout: self
                clean: true
                displayName: Checkout repository (clean)

              - script: |
                  if exist .npmrc (
                    echo Printing .npmrc
                    type .npmrc
                  ) else (
                    echo .npmrc not found
                  )
                displayName: Print .npmrc

              - script: |
                  npm config set registry https://registry.npmjs.org/
                  npm config set @vscode:registry $(AZURE_ARTIFACTS_FEED)
                  npm config set always-auth false
                  echo npm registry: 
                  npm config get registry
                  echo @vscode registry:
                  npm config get @vscode:registry
                displayName: Configure npm registries for debug

              - script: |
                  echo ===== npm environment overrides =====
                  set NPM_CONFIG_
                  echo NPM_CONFIG_REGISTRY=%NPM_CONFIG_REGISTRY%
                  echo.
                  echo ===== npm config files =====
                  echo userconfig:
                  npm config get userconfig
                  echo globalconfig:
                  npm config get globalconfig
                  echo.
                  echo ===== effective npm registry config =====
                  npm config get registry
                  npm config get @vscode:registry
                  npm config get always-auth
                  npm config list -l | findstr /i "registry userconfig globalconfig always-auth" || echo no registry lines found
                  echo.
                  echo ===== package-lock feed references =====
                  if exist package-lock.json (
                    findstr /i /c:"pkgs.dev.azure.com/azure-public/vside/_packaging/python-environments/npm/registry/" package-lock.json || echo no azure feed references in package-lock.json
                  ) else (
                    echo package-lock.json not found
                  )
                displayName: Run npm config checks

              - script: npm ci
                displayName: Debug npm ci

              - task: PowerShell@2
                displayName: Capture npm debug logs on failure
                condition: failed()
                continueOnError: true
                inputs:
                  pwsh: true
                  targetType: inline
                  script: |
                    $artifactDir = "$(Build.ArtifactStagingDirectory)/npm-logs"
                    New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null

                    $npmCache = (npm config get cache 2>$null).Trim()
                    if (-not $npmCache) {
                      Write-Host "npm cache path is unavailable."
                      exit 0
                    }

                    $logDir = Join-Path $npmCache "_logs"
                    Write-Host "npm cache: $npmCache"
                    Write-Host "npm log dir: $logDir"

                    if (-not (Test-Path $logDir)) {
                      Write-Host "npm log directory not found."
                      exit 0
                    }

                    $logs = Get-ChildItem -Path $logDir -File -Filter "*-debug-*.log" | Sort-Object LastWriteTime -Descending
                    if (-not $logs) {
                      Write-Host "No npm debug logs found."
                      exit 0
                    }

                    $latest = $logs[0]
                    Write-Host "Latest npm debug log: $($latest.FullName)"
                    Write-Host "--- Last 200 lines of npm debug log ---"
                    Get-Content -Path $latest.FullName -Tail 200

                    $logs | Select-Object -First 10 | ForEach-Object {
                      Copy-Item -Path $_.FullName -Destination $artifactDir -Force
                    }

              - task: PowerShell@2
                displayName: Upload npm failure logs
                condition: failed()
                continueOnError: true
                inputs:
                  pwsh: true
                  targetType: inline
                  script: |
                    $artifactDir = "$(Build.ArtifactStagingDirectory)/npm-logs"
                    if (-not (Test-Path $artifactDir)) {
                      Write-Host "No npm log directory found to upload."
                      exit 0
                    }

                    $logFiles = Get-ChildItem -Path $artifactDir -File -ErrorAction SilentlyContinue
                    if (-not $logFiles) {
                      Write-Host "No npm log files found to upload."
                      exit 0
                    }

                    Write-Host "Uploading npm failure logs from $artifactDir"
                    Write-Host "##vso[artifact.upload containerfolder=npm-failure-logs;artifactname=npm-failure-logs]$artifactDir"

      - stage: Build
        displayName: Build & Package Extension
        dependsOn: PreBuildDebug
        jobs:
          - template: azure-pipelines/extension/templates/jobs/package.yml@templates
            parameters:
              buildSteps: ${{ parameters.buildSteps }}
              isPreRelease: false
              standardizedVersioning: true

